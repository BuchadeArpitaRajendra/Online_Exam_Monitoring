<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
       
        }

        .box{
            width:450px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        button{

            width:220px;
            padding:12px;
            margin:10px;
            font-size:16px;
            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Candidate Dashboard</h2>

<h3>Welcome {{ name }}</h3>

<br>

<a href="/start_exam">
<button>Start Exam</button>
</a>

<br>

<a href="/pause_exam">
<button>Pause Exam</button>
</a>

<br>

<a href="/resume_exam">
<button>Resume Exam</button>
</a>

<br>

<a href="/end_exam">
<button>End Exam</button>
</a>

<br>



<h3>Browser Monitoring</h3>

<p>
    Browser Status:
    <span id="browserStatus" style="color:green;">
        Browser Active
    </span>
</p>

<p>
    Focus Loss Count:
    <span id="focusCount">0</span>
</p>

<p>
    Last Focus Loss Time:
    <span id="lastFocusTime">None</span>
</p>
</div>
<script src="{{ url_for('static', filename='js/browser_monitor.js') }}"></script>
<!-- <script src="\static\js\browser_monitor.js"></script> -->
</body>
</html>
