<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        .box{
            width:450px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        button{

            width:220px;
            padding:12px;
            margin:10px;
            font-size:16px;
            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Candidate Dashboard</h2>

<h3>Welcome {{ name }}</h3>

<br>

<a href="/start_exam">
<button>Start Exam</button>
</a>

<br>

<a href="/pause_exam">
<button>Pause Exam</button>
</a>

<br>

<a href="/resume_exam">
<button>Resume Exam</button>
</a>

<br>

<a href="/end_exam">
<button>End Exam</button>
</a>

</div>

</body>
</html>
